# Configuração de timeouts e limites de API
# Os valores de env sobrescrevem este arquivo.

timeouts:
  gemini_api: 60
  tavily_api: 30
  ollama_api: 120
  apify_actor: 180       # actors podem demorar mais que APIs REST
  agent_subprocess: 120  # timeout por subprocess no orquestrador (AGENT_TIMEOUT_S)

rate_limits:
  gemini_rpm: 15              # requests per minute — free tier
  tavily_monthly: 1000        # requests mensais — free tier (referência)
  apify_credits_monthly: 5000 # créditos mensais — free tier (referência)
